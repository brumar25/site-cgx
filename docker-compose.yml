version: '3.8'

services:
  cgx-site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cgx-site
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cgx-site.rule=Host(`cgxperts.org`) || Host(`www.cgxperts.org`)"
      - "traefik.http.routers.cgx-site.entrypoints=websecure"
      - "traefik.http.routers.cgx-site.tls.certresolver=letsencrypt"
      - "traefik.http.services.cgx-site.loadbalancer.server.port=3000"
      # Redirect non-www -> www
      - "traefik.http.middlewares.cgx-www-redirect.redirectregex.regex=^https://cgxperts\\.org/(.*)"
      - "traefik.http.middlewares.cgx-www-redirect.redirectregex.replacement=https://www.cgxperts.org/$${1}"
      - "traefik.http.middlewares.cgx-www-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.cgx-site.middlewares=cgx-www-redirect"

networks:
  dokploy-network:
    external: true
