version: '3.8'

services:
  cgx-site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cgx-site
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - cgx-network

  # Nginx reverse proxy (opcional — recomendado para SSL + domínio)
  nginx:
    image: nginx:alpine
    container_name: cgx-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - cgx-site
    networks:
      - cgx-network
    profiles:
      - with-nginx

networks:
  cgx-network:
    driver: bridge
